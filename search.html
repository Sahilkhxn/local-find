<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item Dhundho — LocalFind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Hind:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #faf7f0;
    --saffron: #f97316;
    --saffron-light: #fed7aa;
    --saffron-dark: #c2410c;
    --green: #16a34a;
    --green-light: #dcfce7;
    --muted: #78716c;
    --border: #e7e0d0;
    --card: #ffffff;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Hind', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1.5px solid var(--border);
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 24px;
    color: var(--ink);
    text-decoration: none;
  }
  .logo-dot { color: var(--saffron); }

  .back-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }
  .back-link:hover { color: var(--ink); }

  .search-hero {
    background: var(--ink);
    color: white;
    padding: 48px 40px 56px;
    text-align: center;
  }

  .search-hero h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .search-hero h1 span { color: var(--saffron); }

  .search-hero p {
    color: rgba(255,255,255,0.5);
    font-size: 15px;
    margin-bottom: 32px;
  }

  .search-box {
    max-width: 640px;
    margin: 0 auto;
    background: white;
    border-radius: 20px;
    padding: 6px 6px 6px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .search-icon { font-size: 18px; flex-shrink: 0; }

  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Hind', sans-serif;
    font-size: 16px;
    color: var(--ink);
    background: transparent;
  }

  .search-box input::placeholder { color: var(--muted); }

  .search-btn {
    background: var(--saffron);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 13px 28px;
    font-family: 'Hind', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .search-btn:hover { background: var(--saffron-dark); }

  .location-bar {
    max-width: 640px;
    margin: 16px auto 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .location-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.8);
  }

  .categories-bar {
    padding: 20px 40px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    border-bottom: 1.5px solid var(--border);
    background: var(--paper);
    -webkit-overflow-scrolling: touch;
  }

  .categories-bar::-webkit-scrollbar { display: none; }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    background: white;
    font-family: 'Hind', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    color: var(--muted);
  }

  .cat-btn:hover, .cat-btn.active {
    border-color: var(--saffron);
    color: var(--saffron);
    background: #fff7ed;
  }

  .content-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 40px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
  }

  .empty-icon { font-size: 56px; margin-bottom: 20px; }

  .empty-state h3 {
    font-family: 'Baloo 2', cursive;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .empty-state p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
  }

  .loading-state {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .loading-state.show { display: block; }

  .loading-pulse {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .pulse-dot {
    width: 10px;
    height: 10px;
    background: var(--saffron);
    border-radius: 50%;
    animation: pulseDot 1.2s ease-in-out infinite;
  }

  .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
  .pulse-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulseDot {
    0%, 100% { transform: scale(0.6); opacity: 0.4; }
    50% { transform: scale(1); opacity: 1; }
  }

  .loading-state h3 {
    font-family: 'Baloo 2', cursive;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .loading-state p { color: var(--muted); font-size: 14px; }

  .results-state { display: none; }
  .results-state.show { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-count {
    font-family: 'Baloo 2', cursive;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
  }

  .results-count span { color: var(--saffron); }

  .no-results {
    text-align: center;
    padding: 60px 20px;
  }

  .no-results h3 {
    font-family: 'Baloo 2', cursive;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .no-results p { color: var(--muted); font-size: 15px; }

  .shops-grid { display: grid; gap: 16px; }

  .shop-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: start;
    transition: all 0.3s;
    animation: slideInCard 0.4s ease both;
  }

  @keyframes slideInCard {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .shop-card:hover {
    border-color: var(--saffron);
    box-shadow: 0 8px 32px rgba(249,115,22,0.1);
    transform: translateY(-2px);
  }

  .shop-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }

  .shop-avatar {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: var(--saffron-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .shop-name {
    font-family: 'Baloo 2', cursive;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    text-transform: capitalize;
  }

  .shop-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .meta-chip { display: flex; align-items: center; gap: 4px; }
  .stars { color: #f59e0b; }

  .available-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
    background: var(--green-light);
    color: var(--green);
  }

  .shop-right { text-align: right; min-width: 160px; }

  .shop-address {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }

  .shop-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .tag-chip {
    padding: 4px 12px;
    background: #f5f5f0;
    border-radius: 50px;
    font-size: 11px;
    color: var(--muted);
    text-transform: capitalize;
  }

  .wa-btn {
    background: #25D366;
    color: white;
    border: none;
    border-radius: 14px;
    padding: 12px 20px;
    font-family: 'Hind', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    text-decoration: none;
    margin-top: 12px;
  }

  .wa-btn:hover {
    background: #1da851;
    transform: translateY(-1px);
  }

  /* Floating WhatsApp Button */
  .whatsapp-float {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
    background: #25D366;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    text-decoration: none;
    transition: transform 0.2s;
  }

  .whatsapp-float:hover { transform: scale(1.1); }

  @media (max-width: 768px) {
    nav { padding: 14px 20px; }
    .search-hero { padding: 32px 20px 48px; }
    .search-hero h1 { font-size: 26px; }
    .categories-bar { padding: 16px 20px; }
    .content-wrap { padding: 24px 20px; }
    .shop-card { grid-template-columns: 1fr; }
    .shop-right { text-align: left; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Local<span class="logo-dot">Find</span></a>
  <a href="index.html" class="back-link">← Home</a>
</nav>

<div class="search-hero">
  <h1>What Do You <span>Need?</span></h1>
  <p>Nearby shops will respond instantly</p>

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="mobile, saree, medicine, electronics..." />
    <button class="search-btn" onclick="doSearch()">Search →</button>
  </div>

  <div class="location-bar">
    <div class="location-chip">📍 Jaipur, Rajasthan</div>
  </div>
</div>

<div class="categories-bar">
  <button class="cat-btn active" onclick="filterCat(this,'all')">🏪 All</button>
  <button class="cat-btn" onclick="filterCat(this,'electronics')">📱 Electronics</button>
  <button class="cat-btn" onclick="filterCat(this,'kirana')">🛒 Kirana</button>
  <button class="cat-btn" onclick="filterCat(this,'kapde')">👕 Clothing</button>
  <button class="cat-btn" onclick="filterCat(this,'dawai')">💊 Pharmacy</button>
  <button class="cat-btn" onclick="filterCat(this,'jewellery')">💍 Jewellery</button>
  <button class="cat-btn" onclick="filterCat(this,'furniture')">🪑 Furniture</button>
</div>

<div class="content-wrap">

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🔍</div>
    <h3>Kya Dhundh Rahe Ho?</h3>
    <p>Upar search karein — nearby shops turant reply karenge.</p>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="loading-pulse">
      <div class="pulse-dot"></div>
      <div class="pulse-dot"></div>
      <div class="pulse-dot"></div>
    </div>
    <h3>Shops dhundh rahe hain...</h3>
    <p id="loadingMsg">Jaipur ke registered shops check ho rahe hain</p>
  </div>

  <div class="results-state" id="resultsState">
    <div class="results-header">
      <div class="results-count" id="resultsCount"><span>0</span> shops mili</div>
    </div>
    <div class="shops-grid" id="shopsGrid"></div>
  </div>

</div>

<!-- Floating WhatsApp -->
<a href="https://wa.me/918209914101" target="_blank" class="whatsapp-float" title="Humse baat karein">
  <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="white">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
    <path d="M12 0C5.373 0 0 5.373 0 12c0 2.117.549 4.107 1.51 5.845L.057 23.571a.75.75 0 0 0 .906.94l5.934-1.56A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.73 9.73 0 0 1-4.964-1.355l-.356-.212-3.681.968.984-3.595-.232-.37A9.718 9.718 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/>
  </svg>
</a>

<script>
  let searchQuery = '';
  let activeCat = 'all';

  const categoryEmojis = {
    electronics: '📱', kirana: '🛒', kapde: '👕',
    dawai: '💊', jewellery: '💍', furniture: '🪑',
    default: '🏪'
  };

  function getCatEmoji(category) {
    if (!category) return '🏪';
    const cat = category.toLowerCase();
    for (const key in categoryEmojis) {
      if (cat.includes(key)) return categoryEmojis[key];
    }
    return '🏪';
  }

  function doSearch() {
    searchQuery = document.getElementById('searchInput').value.trim();
    if (!searchQuery) return;
    showLoading();

    let url = `/api/shops/search?q=${encodeURIComponent(searchQuery)}&city=jaipur`;
    if (activeCat !== 'all') url += `&cat=${encodeURIComponent(activeCat)}`;

    fetch(url)
      .then(res => res.json())
      .then(data => {
        if (data.ok && data.data && data.data.shops && data.data.shops.length > 0) {
          renderShops(data.data.shops);
        } else {
          renderEmpty();
        }
      })
      .catch(() => renderEmpty());
  }

  function showLoading() {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultsState').classList.remove('show');
    document.getElementById('loadingState').classList.add('show');
  }

  function renderShops(shops) {
    document.getElementById('loadingState').classList.remove('show');
    document.getElementById('resultsState').classList.add('show');
    document.getElementById('resultsCount').innerHTML = `<span>${shops.length}</span> shop${shops.length > 1 ? 's' : ''} mili`;

    const grid = document.getElementById('shopsGrid');
    grid.innerHTML = '';

    shops.forEach((shop, idx) => {
      const emoji = getCatEmoji(shop.category);
      const userQuery = document.getElementById('searchInput').value.trim() || searchQuery;
      const waMsg = encodeURIComponent(`Namaste! Main LocalFind se aa raha hoon.\n\nMujhe chahiye: ${userQuery}\nKya yeh available hai?`); 
      const waLink = `https://wa.me/${shop.wa_primary}?text=${waMsg}`;
      const tags = [shop.category, shop.area].filter(Boolean);
      const stars = '★'.repeat(Math.round(shop.rating || 4)) + '☆'.repeat(5 - Math.round(shop.rating || 4));

      grid.innerHTML += `
        <div class="shop-card" style="animation-delay:${idx * 0.06}s">
          <div class="shop-main">
            <div class="shop-top">
              <div class="shop-avatar">${emoji}</div>
              <div>
                <div class="shop-name">${shop.shop_name}</div>
                <div class="shop-meta">
                  <span class="meta-chip"><span class="stars">${stars}</span> ${shop.rating || '4.0'}</span>
                  <span class="meta-chip">${shop.total_reviews || 0} reviews</span>
                  <span class="available-badge">✓ Available</span>
                </div>
                <div class="shop-address">📍 ${shop.address || shop.area || 'Jaipur'}</div>
              </div>
            </div>
            <div class="shop-tags">
              ${tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
            </div>
          </div>

          <div class="shop-right">
            <a class="wa-btn" href="${waLink}" target="_blank">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                <path d="M12 0C5.373 0 0 5.373 0 12c0 2.117.549 4.107 1.51 5.845L.057 23.571a.75.75 0 0 0 .906.94l5.934-1.56A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.73 9.73 0 0 1-4.964-1.355l-.356-.212-3.681.968.984-3.595-.232-.37A9.718 9.718 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/>
              </svg>
              WhatsApp Karo
            </a>
          </div>
        </div>`;
    });
  }

  function renderEmpty() {
    document.getElementById('loadingState').classList.remove('show');
    document.getElementById('resultsState').classList.add('show');
    document.getElementById('resultsCount').innerHTML = `<span>0</span> shops mili`;
    document.getElementById('shopsGrid').innerHTML = `
      <div class="no-results">
        <div style="font-size:48px;margin-bottom:16px;">😕</div>
        <h3>"${searchQuery}" ke liye koi shop nahi mili</h3>
        <p>Koi aur word try karein ya category change karein.</p>
      </div>`;
  }

  function filterCat(btn, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = cat;
    if (searchQuery) doSearch();
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // Auto-search if URL has query param
  const urlParams = new URLSearchParams(window.location.search);
  const q = urlParams.get('q');
  if (q) {
    document.getElementById('searchInput').value = q;
    searchQuery = q;
    doSearch();
  }
</script>

</body>
</html>
